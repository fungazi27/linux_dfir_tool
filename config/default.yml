tool:
  name: "Linux Incident Response Toolkit"
  version: "0.1.0"
  author: "Gabriel Garcia"

output:
  default_directory: "output"
  formats:
    - "json"
    - "csv"
    - "html"

logging:
  level: "INFO"

platform:
  supported:
    - "ubuntu"
    - "debian"

detections:
  authentication:
    failed_login_threshold: 5
    sudo_threshold: 20